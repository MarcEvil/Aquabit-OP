<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Técnico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .grid-fotos {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .item-foto {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 110px;
        }

        .item-foto img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .badge-ok {
            background: #dcfce7;
            color: #166534;
            font-size: 10px;
            padding: 6px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
        }

        .btn-repo {
            background: white;
            color: var(--primary);
            border: 1px solid var(--primary);
            font-size: 10px;
            padding: 6px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            font-weight: bold;
        }

        .btn-del {
            width: 100%;
            background: #fff1f2;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>
        <div class="tabs">
            <button id="t-corte" class="tab-btn active" onclick="setTab('corte')">CORTES</button>
            <button id="t-repo" class="tab-btn" onclick="setTab('reposicion')">REPOSICIÓN</button>
        </div>

        <button class="btn-cam" onclick="document.getElementById('f').click()">📸 TOMAR FOTOS</button>
        <input type="file" id="f" accept="image/*" capture="environment" multiple hidden>
        <div id="p" style="display:flex; gap:5px; margin-top:10px;"></div>
        <textarea id="o" style="width:100%; margin:10px 0; border-radius:8px; padding:10px;"
            placeholder="Notas..."></textarea>
        <button id="s"
            style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;"
            onclick="subir()">GUARDAR REGISTRO</button>

        <div id="h"></div>
    </div>

    <script>
        const S_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(S_URL, S_KEY);
        let tab = 'corte', files = [];

        function setTab(t) {
            tab = t;
            document.getElementById('t-corte').className = t === 'corte' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('t-repo').className = t === 'reposicion' ? 'tab-btn active' : 'tab-btn';
            files = []; document.getElementById('p').innerHTML = ''; load();
        }

        document.getElementById('f').onchange = e => {
            Array.from(e.target.files).forEach(file => {
                files.push(file);
                const r = new FileReader();
                r.onload = ev => {
                    const img = document.createElement('img');
                    img.src = ev.target.result; img.style.width = "60px"; img.style.borderRadius = "5px";
                    document.getElementById('p').appendChild(img);
                };
                r.readAsDataURL(file);
            });
        };

        async function subir() {
            if (!files.length) return alert("Faltan fotos");
            try {
                const urls = [];
                for (let file of files) {
                    const name = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    await supabaseClient.storage.from('fotos-aquabit').upload(name, file);
                    const { data } = supabaseClient.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push({ url: data.publicUrl, verificado: false });
                }
                await fetch(`${API}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: tab, observaciones: document.getElementById('o').value, fotos: urls })
                });
                setTab(tab);
            } catch (e) { alert("Error al subir"); }
        }

        async function load() {
            const h = document.getElementById('h'); h.innerHTML = 'Cargando historial...';
            try {
                const res = await fetch(`${API}/registros/${tab}`);
                const data = await res.json();
                h.innerHTML = data.map(reg => `
                    <div class="card">
                        <div class="grid-fotos">${reg.fotos.map((f, i) => {
                    const url = f.url || f;
                    const ok = f.verificado;
                    return `
                            <div class="item-foto">
                                <img src="${url}" onclick="window.open('${url}')">
                                ${tab === 'reposicion' ? (
                            ok ? `<div class="badge-ok">✔️ REPUESTO<br>${f.fechaRepo || ''}</div>`
                                : `<button class="btn-repo" onclick="patch(${reg.id}, ${i})">Marcar Repuesto</button>`
                        ) : ''}
                            </div>`;
                }).join('')}</div>
                        <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                        <p>${reg.observaciones || ''}</p>
                        <button class="btn-del" onclick="del(${reg.id})">🗑️ ELIMINAR</button>
                    </div>
                `).join('');
            } catch (e) { h.innerHTML = 'Sin conexión.'; }
        }

        async function patch(id, idx) {
            await fetch(`${API}/registros/${id}/foto/${idx}`, { method: 'PATCH' });
            load();
        }

        async function del(id) {
            if (confirm("¿Borrar?")) { await fetch(`${API}/registros/${id}`, { method: 'DELETE' }); load(); }
        }

        window.onload = load;
    </script>
</body>

</html>

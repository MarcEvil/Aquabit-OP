<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Pestañas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Botón Cámara */
        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        /* Contenedor de Vista Previa (El cuadrado inferior) */
        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-top: 10px;
            padding: 10px;
            min-height: 110px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 10px;
            font-size: 14px;
            resize: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            background: #f0fdf4;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>

        <div class="tabs">
            <button id="tab-corte-btn" class="tab-btn active" onclick="cambiarTab('corte')">CORTES</button>
            <button id="tab-repo-btn" class="tab-btn" onclick="cambiarTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-corte" class="panel active">
            <button type="button" class="btn-cam" onclick="document.getElementById('input-corte').click()">📸 TOMAR FOTO
                (CORTE)</button>
            <input type="file" id="input-corte" accept="image/*" capture="environment" multiple style="display:none">

            <div id="preview-corte" class="preview-container">
            </div>

            <textarea id="obs-corte" rows="3" placeholder="Observaciones de terreno..."></textarea>
            <button id="btn-save-corte" class="submit-btn" onclick="enviarDatos('corte')">GUARDAR CORTE</button>
        </div>

        <div id="panel-reposicion" class="panel">
            <button type="button" class="btn-cam" onclick="document.getElementById('input-repo').click()">📸 TOMAR FOTO
                (REPO)</button>
            <input type="file" id="input-repo" accept="image/*" capture="environment" multiple style="display:none">

            <div id="preview-repo" class="preview-container"></div>

            <div class="checkbox-group">
                <input type="checkbox" id="check-repo">
                <label for="check-repo"><strong>Servicio verificado en terreno</strong></label>
            </div>

            <textarea id="obs-repo" rows="3" placeholder="Detalles de la reposición..."></textarea>
            <button id="btn-save-repo" class="submit-btn" onclick="enviarDatos('reposicion')">GUARDAR
                REPOSICIÓN</button>
        </div>
    </div>

    <script>
        // Configuración de conexiones
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Arreglos para guardar los archivos binarios reales
        let fotosCorte = [];
        let fotosRepo = [];

        // 1. Lógica de Pestañas
        function cambiarTab(tipo) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(`panel-${tipo}`).classList.add('active');
            document.getElementById(`tab-${tipo}-btn`).classList.add('active');
        }

        // 2. Función de Vista Previa Inmediata (Corrección Técnica)
        function configurarVistaPrevia(inputId, storageArray, previewId) {
            const input = document.getElementById(inputId);
            const container = document.getElementById(previewId);

            input.onchange = function (e) {
                const selectedFiles = Array.from(e.target.files);

                selectedFiles.forEach(file => {
                    storageArray.push(file); // Mantenemos el archivo en memoria

                    const reader = new FileReader();
                    reader.onload = function (event) {
                        const imgDiv = document.createElement('div');
                        imgDiv.className = 'preview-item';
                        imgDiv.innerHTML = `<img src="${event.target.result}">`;
                        container.appendChild(imgDiv);
                    };
                    reader.readAsDataURL(file); // Genera la miniatura local
                });
            };
        }

        // Inicializamos la escucha de fotos
        configurarVistaPrevia('input-corte', fotosCorte, 'preview-corte');
        configurarVistaPrevia('input-repo', fotosRepo, 'preview-repo');

        // 3. Envío final a Supabase y Render
        async function enviarDatos(tipo) {
            const btn = document.getElementById(tipo === 'corte' ? 'btn-save-corte' : 'btn-save-repo');
            const files = tipo === 'corte' ? fotosCorte : fotosRepo;
            const obsText = document.getElementById(tipo === 'corte' ? 'obs-corte' : 'obs-repo').value;
            const isChecked = tipo === 'reposicion' ? document.getElementById('check-repo').checked : false;

            if (files.length === 0) {
                return alert("⚠️ Debes capturar al menos una foto.");
            }

            btn.disabled = true;
            btn.innerText = "🚀 SUBIENDO IMÁGENES...";

            try {
                const urlsFinales = [];

                // Subimos cada archivo al Bucket de Supabase
                for (let file of files) {
                    const nombreUnico = `terreno_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;

                    const { data, error } = await supabaseClient.storage
                        .from('fotos-aquabit')
                        .upload(nombreUnico, file);

                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('fotos-aquabit')
                        .getPublicUrl(nombreUnico);

                    urlsFinales.push(publicUrl);
                }

                btn.innerText = "💾 GUARDANDO EN BASE DE DATOS...";

                // Enviamos las URLs al backend de Render
                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo: tipo,
                        observaciones: isChecked ? "[VERIFICADO] " + obsText : obsText,
                        fotos: urlsFinales
                    })
                });

                if (res.ok) {
                    alert("✅ Guardado con éxito.");
                    location.reload(); // Recarga para limpiar memoria del móvil
                } else {
                    throw new Error("Fallo en la comunicación con Render.");
                }

            } catch (err) {
                alert("❌ ERROR: " + err.message);
                btn.disabled = false;
                btn.innerText = "REINTENTAR GUARDAR";
            }
        }
    </script>

</body>

</html>

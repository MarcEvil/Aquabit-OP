<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaBit OP - Dashboard Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-corte pb-32 transition-colors duration-500">

    <nav class="p-6 text-center">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight">AquaBit OP</h1>
    </nav>

    <div class="container max-w-md mx-auto px-4">

        <div class="grid grid-cols-3 gap-3 mb-6">
            <button id="t-corte" onclick="setTab('corte')" class="btn-action active bg-corte">
                <i class="bi bi-scissors text-xl"></i><br>
                <span class="text-[10px] font-bold uppercase">Cortes</span>
            </button>
            <button id="t-repo" onclick="setTab('reposicion')" class="btn-action bg-repo">
                <i class="bi bi-arrow-repeat text-xl"></i><br>
                <span class="text-[10px] font-bold uppercase">Reposición</span>
            </button>
            <button onclick="document.getElementById('f').click()" class="btn-action bg-evidencia">
                <i class="bi bi-camera text-xl"></i><br>
                <span class="text-[10px] font-bold uppercase">Evidencia</span>
            </button>
        </div>

        <input type="file" id="f" accept="image/*" capture="environment" multiple hidden>

        <div id="p" class="flex gap-2 overflow-x-auto mb-4 min-h-[40px] items-center"></div>

        <div class="mb-6">
            <label class="block text-slate-600 font-bold mb-2 text-sm ml-1">Observaciones de terreno...</label>
            <div class="neumorphic-in p-4 rounded-2xl">
                <textarea id="o" placeholder="Ingresa detalles del servicio..."
                    class="w-full bg-transparent border-none outline-none text-slate-700 h-20 resize-none font-medium"></textarea>
            </div>
        </div>

        <button id="s" onclick="subir()"
            class="w-full bg-save text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 mb-8">
            <i class="bi bi-cloud-arrow-up-fill"></i> GUARDAR REGISTRO
        </button>

        <div class="flex items-center gap-2 mb-4 px-1">
            <i class="bi bi-clock-history font-bold text-slate-800"></i>
            <h2 class="font-bold text-slate-800">Historial Reciente</h2>
        </div>

        <div id="h" class="space-y-6"></div>
    </div>

    <nav class="footer-nav fixed bottom-0 left-0 w-full flex justify-around items-center py-4 z-50">
        <button class="f-item" onclick="location.reload()">
            <i class="bi bi-house-door-fill"></i>
        </button>

        <a href="galeria.html" class="f-item flex flex-col items-center no-underline">
            <i class="bi bi-database-fill-gear text-2xl"></i>
            <span class="text-[8px] font-black uppercase mt-1">DB Total</span>
        </a>

        <div class="relative -top-6">
            <button
                class="w-14 h-14 bg-evidencia text-white rounded-full text-3xl shadow-xl flex items-center justify-center font-bold"
                onclick="document.getElementById('f').click()">
                <i class="bi bi-plus-lg"></i>
            </button>
        </div>

        <a href="https://aqua-chat-three.vercel.app" class="f-item flex flex-col items-center no-underline">
            <i class="bi bi-chat-dots-fill text-2xl text-blue-600"></i>
            <span class="text-[8px] font-black uppercase mt-1">Chat</span>
        </a>

        <button class="f-item" onclick="load()">
            <i class="bi bi-arrow-clockwise"></i>
        </button>
    </nav>
    <div class="text-center py-4 mb-4">
        <p class="text-[10px] text-slate-500 font-medium uppercase tracking-widest">
            &copy; 2026 AquaBit OP. Todos los derechos reservados.

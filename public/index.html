<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <nav class="header shadow-in">
        <h1>AquaBit OP</h1>
    </nav>

    <div class="container pb-5">

        <div class="row-tabs mb-4">
            <div class="col-4">
                <button id="t-corte" class="btn btn-action tab-corte active shadow-out" onclick="setTab('corte')">
                    <span class="ico-txt">CORTES</span>
                </button>
            </div>
            <div class="col-4">
                <button id="t-repo" class="btn btn-action tab-repo shadow-out" onclick="setTab('reposicion')">
                    <span class="ico-txt">REPOSICIÓN</span>
                </button>
            </div>
            <div class="col-4">
                <button class="btn btn-action btn-cam shadow-out" onclick="document.getElementById('f').click()">
                    <span class="ico-txt">TOMAR EVIDENCIA</span>
                </button>
            </div>
        </div>

        <input type="file" id="f" accept="image/*" capture="environment" multiple hidden>

        <div class="card card-carga shadow-out mb-4">
            <label for="o" class="text-secondary fw-bold mb-2 d-block">Observaciones de terreno...</label>
            <textarea class="form-control" placeholder="Notas" id="o"></textarea>
        </div>

        <button id="s" class="btn btn-submit shadow-out mb-4" onclick="subir()">
            <span class="ico-txt">GUARDAR REGISTRO</span>
        </button>

        <div class="historial-title mb-3 shadow-in">
            <span class="fw-bold">Historial Reciente</span>
        </div>

        <div id="h"></div>
    </div>

    <nav class="footer-nav shadow-in">
        <button class="foot-btn active"><span class="nav-ico">🏠</span></button>
        <button class="foot-btn"><span class="nav-ico">🔖</span></button>
        <button class="foot-btn plus-btn shadow-out"><span>+</span></button>
        <button class="foot-btn"><span class="nav-ico">📄</span></button>
        <button class="foot-btn"><span class="nav-ico">⋮</span></button>
    </nav>

    <script src="script.js"></script>
</body>

</html>

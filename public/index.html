<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 10px 0;
            padding: 10px;
            min-height: 110px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
        }

        .preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Historial Permanente */
        .historial-section {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .registro-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .fotos-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .fotos-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .status-repuesto {
            display: inline-block;
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            border: 1px solid #bbf7d0;
        }

        .btn-delete {
            color: var(--danger);
            background: none;
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>

        <div class="tabs">
            <button id="tab-corte-btn" class="tab-btn active" onclick="cambiarTab('corte')">CORTES</button>
            <button id="tab-repo-btn" class="tab-btn" onclick="cambiarTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-principal">
            <button class="btn-cam" onclick="document.getElementById('input-file').click()">📸 TOMAR FOTOS</button>
            <input type="file" id="input-file" accept="image/*" capture="environment" multiple style="display:none">

            <div id="preview-area" class="preview-container"></div>
            <textarea id="obs-area" placeholder="Notas de terreno..."></textarea>
            <button id="btn-save" class="submit-btn" onclick="ejecutarGuardado()">GUARDAR REGISTRO</button>
        </div>

        <div class="historial-section">
            <h3 id="titulo-historial">Historial de Cortes</h3>
            <div id="lista-historial"></div>
        </div>
    </div>

    <script>
        // SOLUCIÓN AL ERROR DE CONSOLA: Solo una declaración de supabase
        const S_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API = 'https://aquabit-op.onrender.com/api';

        // Usamos un nombre único para evitar conflictos con el SDK
        const clientSupabase = supabase.createClient(S_URL, S_KEY);

        let currentTab = 'corte';
        let fotosTemporales = [];

        function cambiarTab(tipo) {
            currentTab = tipo;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tipo}-btn`).classList.add('active');
            document.getElementById('titulo-historial').innerText = `Historial de ${tipo === 'corte' ? 'Cortes' : 'Reposiciones'}`;

            // Reset formulario
            fotosTemporales = [];
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('obs-area').value = '';

            cargarHistorial();
        }

        document.getElementById('input-file').onchange = function (e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                fotosTemporales.push(file);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const div = document.createElement('div');
                    div.className = 'preview-item';
                    div.innerHTML = `<img src="${ev.target.result}">`;
                    document.getElementById('preview-area').appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        };

        async function ejecutarGuardado() {
            if (fotosTemporales.length === 0) return alert("Faltan fotos");
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "SUBIENDO...";

            try {
                const urls = [];
                for (let file of fotosTemporales) {
                    const name = `img_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    const { error } = await clientSupabase.storage.from('fotos-aquabit').upload(name, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = clientSupabase.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push(publicUrl);
                }

                await fetch(`${API}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo: currentTab,
                        observaciones: document.getElementById('obs-area').value,
                        fotos: urls
                    })
                });

                alert("✅ Guardado correctamente");
                cambiarTab(currentTab);
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        }

        async function cargarHistorial() {
            const lista = document.getElementById('lista-historial');
            lista.innerHTML = '<p>Cargando...</p>';
            try {
                const res = await fetch(`${API}/registros/${currentTab}`);
                const datos = await res.json();
                lista.innerHTML = '';
                datos.forEach(reg => {
                    const card = document.createElement('div');
                    card.className = 'registro-card';
                    const badge = currentTab === 'reposicion' ? '<span class="status-repuesto">✔️ REPUESTO</span>' : '';
                    card.innerHTML = `
                        ${badge}
                        <div class="fotos-grid">${reg.fotos.map(u => `<img src="${u}" onclick="window.open('${u}')">`).join('')}</div>
                        <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                        <p>${reg.observaciones || ''}</p>
                        <button class="btn-delete" onclick="eliminarReg(${reg.id})">ELIMINAR</button>
                    `;
                    lista.appendChild(card);
                });
            } catch (e) { lista.innerHTML = 'Error de conexión.'; }
        }

        async function eliminarReg(id) {
            if (confirm('¿Eliminar?')) {
                await fetch(`${API}/registros/${id}`, { method: 'DELETE' });
                cargarHistorial();
            }
        }

        window.onload = cargarHistorial;
    </script>
</body>

</html>

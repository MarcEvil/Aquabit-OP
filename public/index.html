<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Gestión Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4">
        <div class="container justify-content-center">
            <span class="navbar-brand mb-0 h1"><i class="bi bi-droplet-half"></i> AquaBit OP</span>
        </div>
    </nav>

    <div class="container pb-5" style="max-width: 600px;">
        <div class="row g-2 mb-4">
            <div class="col-6">
                <button id="t-corte" class="btn btn-outline-primary w-100 fw-bold shadow-sm active"
                    onclick="setTab('corte')">
                    <i class="bi bi-scissors"></i> CORTES
                </button>
            </div>
            <div class="col-6">
                <button id="t-repo" class="btn btn-outline-primary w-100 fw-bold shadow-sm"
                    onclick="setTab('reposicion')">
                    <i class="bi bi-arrow-repeat"></i> REPOSICIÓN
                </button>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4 animate-in">
            <div class="card-body">
                <button class="btn btn-success w-100 py-3 mb-3 fw-bold shadow-sm btn-cam"
                    onclick="document.getElementById('f').click()">
                    <i class="bi bi-camera-fill me-2"></i> TOMAR EVIDENCIA
                </button>
                <input type="file" id="f" accept="image/*" capture="environment" multiple hidden>

                <div id="p" class="d-flex gap-2 overflow-auto py-2 mb-2"></div>

                <div class="form-floating mb-3">
                    <textarea class="form-control" placeholder="Notas" id="o" style="height: 100px"></textarea>
                    <label for="o">Observaciones de terreno...</label>
                </div>

                <button id="s" class="btn btn-primary w-100 py-2 fw-bold" onclick="subir()">
                    <i class="bi bi-cloud-arrow-up-fill me-1"></i> GUARDAR REGISTRO
                </button>
            </div>
        </div>

        <h5 class="text-secondary mb-3"><i class="bi bi-clock-history"></i> Historial Reciente</h5>
        <div id="h"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>

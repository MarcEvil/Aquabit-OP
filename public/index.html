<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        /* Contenedor de Vista Previa */
        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin-top: 10px;
            padding: 5px;
            min-height: 100px;
            border: 1px dashed #ccc;
            border-radius: 8px;
        }

        .preview-item {
            position: relative;
            flex-shrink: 0;
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
        }

        .submit-btn:disabled {
            background: #94a3b8;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            background: #f0fdf4;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🌊 AquaBit OP</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('corte')">CORTES</button>
            <button class="tab-btn" onclick="switchTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-corte" class="panel active">
            <button type="button" class="btn-cam" onclick="document.getElementById('input-corte').click()">📸 TOMAR FOTO
                (CORTE)</button>
            <input type="file" id="input-corte" accept="image/*" capture="environment" multiple style="display:none">
            <div id="preview-corte" class="preview-container"></div>
            <textarea id="obs-corte" placeholder="Observaciones de corte..."></textarea>
            <button id="btn-save-corte" class="submit-btn" onclick="enviar('corte')">GUARDAR CORTE</button>
        </div>

        <div id="panel-reposicion" class="panel">
            <button type="button" class="btn-cam" onclick="document.getElementById('input-repo').click()">📸 TOMAR FOTO
                (REPO)</button>
            <input type="file" id="input-repo" accept="image/*" capture="environment" multiple style="display:none">
            <div id="preview-repo" class="preview-container"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="check-repo"> <label for="check-repo">Servicio verificado</label>
            </div>
            <textarea id="obs-repo" placeholder="Observaciones de reposición..."></textarea>
            <button id="btn-save-repo" class="submit-btn" onclick="enviar('reposicion')">GUARDAR REPOSICIÓN</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let storageCorte = [];
        let storageRepo = [];

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
        }

        // --- LÓGICA DE VISTA PREVIA (REPARADA) ---
        function setupPreview(inputId, storageArray, previewId) {
            document.getElementById(inputId).addEventListener('change', function (e) {
                const files = Array.from(e.target.files);
                const container = document.getElementById(previewId);

                files.forEach(file => {
                    storageArray.push(file); // Guardamos el binario real
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const div = document.createElement('div');
                        div.className = 'preview-item';
                        div.innerHTML = `<img src="${event.target.result}">`;
                        container.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            });
        }

        setupPreview('input-corte', storageCorte, 'preview-corte');
        setupPreview('input-repo', storageRepo, 'preview-repo');

        async function enviar(tipo) {
            const files = tipo === 'corte' ? storageCorte : storageRepo;
            const btn = document.getElementById(tipo === 'corte' ? 'btn-save-corte' : 'btn-save-repo');
            const obs = document.getElementById(tipo === 'corte' ? 'obs-corte' : 'obs-repo').value;
            const check = tipo === 'reposicion' ? document.getElementById('check-repo').checked : false;

            if (files.length === 0) return alert("Faltan fotos");

            btn.disabled = true;
            btn.innerText = "SUBIENDO...";

            try {
                const urls = [];
                for (let file of files) {
                    const name = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    const { data, error } = await supabase.storage.from('fotos-aquabit').upload(name, file);
                    if (error) throw error;
                    const { data: { publicUrl } } = supabase.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push(publicUrl);
                }

                await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo,
                        observaciones: check ? "[VERIFICADO] " + obs : obs,
                        fotos: urls
                    })
                });

                alert("✅ Guardado correctamente");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>

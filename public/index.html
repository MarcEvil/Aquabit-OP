<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Evidencia Técnica</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 10px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 12px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
        }

        /* Cuadro de Proceso: Antes y Después */
        .grid-fotos {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .item-proceso {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 130px;
            background: #f9fafb;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .item-proceso img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 5px;
        }

        .img-repo {
            border: 2px solid var(--success) !important;
            margin-top: 5px;
        }

        .badge-ok {
            background: #dcfce7;
            color: #166534;
            font-size: 9px;
            padding: 5px;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 5px;
            text-align: center;
        }

        .btn-adjuntar {
            background: var(--primary);
            color: white;
            border: none;
            font-size: 10px;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            width: 100%;
        }

        .btn-del {
            width: 100%;
            background: #fff1f2;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 8px;
            border-radius: 5px;
            margin-top: 10px;
            font-weight: bold;
        }

        .loading-overlay {
            font-size: 10px;
            color: var(--primary);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>
        <div class="tabs">
            <button id="t-corte" class="tab-btn active" onclick="setTab('corte')">CORTES</button>
            <button id="t-repo" class="tab-btn" onclick="setTab('reposicion')">REPOSICIÓN</button>
        </div>

        <button class="btn-cam" onclick="document.getElementById('f').click()">📸 TOMAR FOTOS INICIALES</button>
        <input type="file" id="f" accept="image/*" capture="environment" multiple hidden>
        <div id="p" style="display:flex; gap:5px; overflow-x:auto;"></div>
        <textarea id="o" style="width:100%; margin:10px 0;" placeholder="Observaciones..."></textarea>
        <button id="s" class="save-btn"
            style="width:100%; padding:15px; background:var(--primary); color:white; border-radius:8px; border:none; font-weight:bold;"
            onclick="subir()">GUARDAR TRABAJO</button>

        <div id="h"></div>
    </div>

    <input type="file" id="f-repo" accept="image/*" capture="environment" hidden>

    <script>
        const S_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(S_URL, S_KEY);
        let tab = 'corte', files = [], currentTarget = null;

        function setTab(t) {
            tab = t;
            document.getElementById('t-corte').classList.toggle('active', t === 'corte');
            document.getElementById('t-repo').classList.toggle('active', t === 'reposicion');
            files = []; document.getElementById('p').innerHTML = ''; load();
        }

        document.getElementById('f').onchange = e => {
            Array.from(e.target.files).forEach(file => {
                files.push(file);
                const r = new FileReader();
                r.onload = ev => {
                    const img = document.createElement('img');
                    img.src = ev.target.result; img.style.width = "60px";
                    document.getElementById('p').appendChild(img);
                };
                r.readAsDataURL(file);
            });
        };

        async function subir() {
            if (!files.length) return alert("Faltan fotos");
            try {
                const urls = [];
                for (let file of files) {
                    const name = `aq_${Date.now()}.jpg`;
                    await supabaseClient.storage.from('fotos-aquabit').upload(name, file);
                    const { data } = supabaseClient.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push({ url: data.publicUrl, verificado: false });
                }
                await fetch(`${API}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: tab, observaciones: document.getElementById('o').value, fotos: urls })
                });
                setTab(tab);
            } catch (e) { alert(e.message); }
        }

        async function load() {
            const h = document.getElementById('h'); h.innerHTML = 'Cargando...';
            const res = await fetch(`${API}/registros/${tab}`);
            const data = await res.json();
            h.innerHTML = data.map(reg => `
                <div class="card">
                    <div class="grid-fotos">${reg.fotos.map((f, i) => {
                return `
                        <div class="item-proceso" id="item-${reg.id}-${i}">
                            <small>INICIAL</small>
                            <img src="${f.url}" onclick="window.open('${f.url}')">
                            
                            ${tab === 'reposicion' ? (
                        f.verificado
                            ? `<div class="badge-ok">✔️ REPUESTO<br>${f.fechaRepo}</div>
                                   <img src="${f.urlRepo}" class="img-repo" onclick="window.open('${f.urlRepo}')">`
                            : `<button class="btn-adjuntar" onclick="prepararRepo(${reg.id}, ${i})">📸 ADJUNTAR REPO</button>`
                    ) : ''}
                        </div>`;
            }).join('')}</div>
                    <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                    <p>${reg.observaciones || ''}</p>
                    <button class="btn-del" onclick="del(${reg.id})">🗑️ ELIMINAR</button>
                </div>
            `).join('');
        }

        function prepararRepo(id, idx) {
            currentTarget = { id, idx };
            document.getElementById('f-repo').click();
        }

        document.getElementById('f-repo').onchange = async (e) => {
            const file = e.target.files;
            if (!file || !currentTarget) return;

            const itemDiv = document.getElementById(`item-${currentTarget.id}-${currentTarget.idx}`);
            itemDiv.innerHTML = '<span class="loading-overlay">SUBIENDO EVIDENCIA...</span>';

            try {
                const name = `repo_${Date.now()}.jpg`;
                await supabaseClient.storage.from('fotos-aquabit').upload(name, file);
                const { data } = supabaseClient.storage.from('fotos-aquabit').getPublicUrl(name);

                await fetch(`${API}/registros/${currentTarget.id}/foto/${currentTarget.idx}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fotoRepoUrl: data.publicUrl })
                });
                load();
            } catch (e) { alert("Error al subir"); load(); }
        };

        async function del(id) {
            if (confirm("¿Borrar?")) { await fetch(`${API}/registros/${id}`, { method: 'DELETE' }); load(); }
        }
        window.onload = load;
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-cam {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button.submit-btn:disabled {
            background: #94a3b8;
        }

        .registro-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .fotos-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .fotos-grid img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            background: #f9fafb;
            padding: 10px;
            border-radius: 8px;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>🌊 AquaBit OP</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('corte')">CORTES</button>
            <button class="tab-btn" onclick="switchTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-corte" class="panel active">
            <form id="form-corte">
                <div class="form-group">
                    <label>Evidencia de Corte (3 fotos)</label>
                    <button type="button" class="btn-cam" onclick="document.getElementById('fotos-corte').click()">📸
                        ABRIR CÁMARA</button>
                    <input type="file" id="fotos-corte" accept="image/*" capture="environment" multiple required
                        style="display:none">
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="obs-corte" rows="3"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="btn-corte-submit">GUARDAR CORTE</button>
            </form>
            <div id="lista-cortes"></div>
        </div>

        <div id="panel-reposicion" class="panel">
            <form id="form-reposicion">
                <div class="form-group">
                    <label>Evidencia de Reposición</label>
                    <button type="button" class="btn-cam" onclick="document.getElementById('fotos-repo').click()">📸
                        ABRIR CÁMARA</button>
                    <input type="file" id="fotos-repo" accept="image/*" capture="environment" multiple
                        style="display:none">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="check-verificado">
                    <label for="check-verificado" style="margin:0">Servicio verificado en terreno</label>
                </div>

                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="obs-repo" rows="3"></textarea>
                </div>
                <button type="submit" class="submit-btn" id="btn-repo-submit">GUARDAR REPOSICIÓN</button>
            </form>
            <div id="lista-reposicion"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');
            cargarRegistros(tab);
        }

        async function subirASupabase(files) {
            const urls = [];
            for (const file of files) {
                const fileName = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                const { data, error } = await supabaseClient.storage
                    .from('fotos-aquabit')
                    .upload(fileName, file);
                if (error) throw error;
                const { data: { publicUrl } } = supabaseClient.storage.from('fotos-aquabit').getPublicUrl(fileName);
                urls.push(publicUrl);
            }
            return urls;
        }

        async function manejarEnvio(e, tipo) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const inputId = tipo === 'corte' ? 'fotos-corte' : 'fotos-repo';
            const obsId = tipo === 'corte' ? 'obs-corte' : 'obs-repo';
            const fileInput = document.getElementById(inputId);
            const obsValue = document.getElementById(obsId).value;

            // Lógica extra para el checkbox de reposición
            let finalObs = obsValue;
            if (tipo === 'reposicion' && document.getElementById('check-verificado').checked) {
                finalObs = "[VERIFICADO] " + obsValue;
            }

            if (tipo === 'corte' && fileInput.files.length !== 3) return alert("Selecciona 3 fotos.");
            if (fileInput.files.length === 0) return alert("Captura fotos primero.");

            btn.disabled = true;
            btn.innerText = 'Subiendo...';

            try {
                const urls = await subirASupabase(fileInput.files);
                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo, observaciones: finalObs, fotos: urls })
                });

                if (res.ok) {
                    alert('✅ Éxito');
                    e.target.reset();
                    cargarRegistros(tipo);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = `GUARDAR ${tipo.toUpperCase()}`;
            }
        }

        document.getElementById('form-corte').onsubmit = (e) => manejarEnvio(e, 'corte');
        document.getElementById('form-reposicion').onsubmit = (e) => manejarEnvio(e, 'reposicion');

        async function cargarRegistros(tipo) {
            const cont = document.getElementById(tipo === 'corte' ? 'lista-cortes' : 'lista-reposicion');
            cont.innerHTML = '...';
            try {
                const res = await fetch(`${API_URL}/registros/${tipo}`);
                const datos = await res.json();
                cont.innerHTML = '';
                datos.forEach(reg => {
                    const card = document.createElement('div');
                    card.className = 'registro-card';
                    card.innerHTML = `
                        <div class="fotos-grid">${reg.fotos.map(u => `<img src="${u}">`).join('')}</div>
                        <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                        <p>${reg.observaciones || ''}</p>
                    `;
                    cont.appendChild(card);
                });
            } catch (e) { }
        }

        window.onload = () => cargarRegistros('corte');
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Versión Original</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .registro {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .preview {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 4px;
        }

        #historial {
            margin-top: 20px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <h1>AquaBit OP - Registro de Terreno</h1>

    <div class="registro">
        <label>Tipo de Operación:</label>
        <select id="tipo">
            <option value="corte">Corte</option>
            <option value="reposicion">Reposición</option>
        </select>

        <br><br>

        <label>Capturar Evidencia:</label>
        <input type="file" id="fotoInput" accept="image/*" capture="environment">
        <button onclick="agregarFoto()">Agregar Foto</button>

        <div id="listaFotos" class="preview"></div>

        <br>

        <label>Observaciones:</label><br>
        <textarea id="obs" rows="4" style="width: 100%"></textarea>

        <br><br>

        <button id="btnEnviar" onclick="enviar()">Sincronizar Datos</button>
    </div>

    <div id="historial">
        <h3>Historial</h3>
        <div id="contenedor"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let fotos = [];

        function agregarFoto() {
            const input = document.getElementById('fotoInput');
            if (input.files && input.files) {
                const file = input.files;
                fotos.push(file); // Guardar el archivo real

                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                document.getElementById('listaFotos').appendChild(img);

                input.value = ""; // Limpiar input para la siguiente
            }
        }

        async function enviar() {
            if (fotos.length === 0) return alert("Sube al menos una foto.");

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "Subiendo...";

            try {
                const urls = [];
                for (let file of fotos) {
                    const name = `${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;

                    const { data, error } = await supabaseClient.storage
                        .from('fotos-aquabit')
                        .upload(name, file);

                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('fotos-aquabit')
                        .getPublicUrl(name);

                    urls.push(publicUrl);
                }

                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo: document.getElementById('tipo').value,
                        observaciones: document.getElementById('obs').value,
                        fotos: urls
                    })
                });

                if (res.ok) {
                    alert("Éxito");
                    location.reload();
                }
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            margin: 10px 0;
            padding: 10px;
            min-height: 110px;
            border: 2px dashed #ccc;
            border-radius: 8px;
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--primary);
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .historial-section {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .registro-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .fotos-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
        }

        .fotos-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        .badge-repo {
            background: #dcfce7;
            color: #166534;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>

        <div class="tabs">
            <button id="tab-corte-btn" class="tab-btn active" onclick="cambiarTab('corte')">CORTES</button>
            <button id="tab-repo-btn" class="tab-btn" onclick="cambiarTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="form-area">
            <button class="btn-cam" onclick="document.getElementById('input-file').click()">📸 TOMAR FOTOS</button>
            <input type="file" id="input-file" accept="image/*" capture="environment" multiple style="display:none">

            <div id="preview-area" class="preview-container"></div>
            <textarea id="obs-area" placeholder="Notas de terreno..."></textarea>
            <button id="btn-save" class="submit-btn" onclick="guardar()">GUARDAR REGISTRO</button>
        </div>

        <div class="historial-section">
            <h3 id="historial-titulo">Historial de Cortes</h3>
            <div id="lista-registros"></div>
        </div>
    </div>

    <script>
        const S_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API = 'https://aquabit-op.onrender.com/api';

        const clientSupabase = supabase.createClient(S_URL, S_KEY);
        let currentTab = 'corte';
        let fotos = [];

        function cambiarTab(tipo) {
            currentTab = tipo;
            // Corregimos la selección de botones para evitar el error de 'classList'
            document.getElementById('tab-corte-btn').classList.toggle('active', tipo === 'corte');
            document.getElementById('tab-repo-btn').classList.toggle('active', tipo === 'reposicion');

            document.getElementById('historial-titulo').innerText = `Historial de ${tipo === 'corte' ? 'Cortes' : 'Reposiciones'}`;

            // Limpiar área de trabajo
            fotos = [];
            document.getElementById('preview-area').innerHTML = '';
            document.getElementById('obs-area').value = '';

            cargarHistorial();
        }

        document.getElementById('input-file').onchange = function (e) {
            const files = Array.from(e.target.files);
            files.forEach(file => {
                fotos.push(file);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.width = "80px";
                    img.style.borderRadius = "8px";
                    document.getElementById('preview-area').appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        };

        async function guardar() {
            if (fotos.length === 0) return alert("Captura fotos primero");
            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.innerText = "SUBIENDO...";

            try {
                const urls = [];
                for (let f of fotos) {
                    const name = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    const { error } = await clientSupabase.storage.from('fotos-aquabit').upload(name, f);
                    if (error) throw error;
                    const { data: { publicUrl } } = clientSupabase.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push(publicUrl);
                }

                await fetch(`${API}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo: currentTab, observaciones: document.getElementById('obs-area').value, fotos: urls })
                });

                alert("✅ Guardado");
                cambiarTab(currentTab);
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        }

        async function cargarHistorial() {
            const lista = document.getElementById('lista-registros');
            lista.innerHTML = '<p>Cargando historial persistente...</p>';
            try {
                const res = await fetch(`${API}/registros/${currentTab}`);
                const registros = await res.json();
                lista.innerHTML = '';
                registros.forEach(reg => {
                    const card = document.createElement('div');
                    card.className = 'registro-card';
                    // Botón/Badge persistente de Repuesto
                    const badge = currentTab === 'reposicion' ? '<span class="badge-repo">✔️ REPUESTO</span>' : '';
                    card.innerHTML = `
                        ${badge}
                        <div class="fotos-grid">${reg.fotos.map(u => `<img src="${u}" onclick="window.open('${u}')">`).join('')}</div>
                        <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                        <p>${reg.observaciones || ''}</p>
                    `;
                    lista.appendChild(card);
                });
            } catch (e) { lista.innerHTML = 'Error al conectar con el servidor.'; }
        }

        window.onload = cargarHistorial;
    </script>
</body>

</html>

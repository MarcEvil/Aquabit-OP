<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <style>
        :root {
            --primary: #2563eb;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        /* Pestañas */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Formularios */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="file"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button.submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        /* Listado de Registros */
        .registro-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .fotos-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .fotos-grid img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .btn-delete {
            background: none;
            color: var(--danger);
            border: 1px solid var(--danger);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            color: #666;
            font-style: italic;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('corte')">CORTES</button>
            <button class="tab-btn" onclick="switchTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-corte" class="panel active">
            <form id="form-corte">
                <div class="form-group">
                    <label>Tomar 3 Fotos (Obligatorio)</label>
                    <input type="file" id="fotos-corte" accept="image/*" multiple required>
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="obs-corte" rows="3" placeholder="Detalles del corte..."></textarea>
                </div>
                <button type="submit" class="submit-btn">GUARDAR CORTE</button>
            </form>

            <div id="lista-cortes">
            </div>
        </div>

        <div id="panel-reposicion" class="panel">
            <form id="form-reposicion">
                <div class="form-group">
                    <label>Fotos Reposición</label>
                    <input type="file" id="fotos-repo" accept="image/*" multiple>
                </div>
                <div class="form-group">
                    <label>Observaciones</label>
                    <textarea id="obs-repo" rows="3"></textarea>
                </div>
                <button type="submit" class="submit-btn">GUARDAR REPOSICIÓN</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://aquabit-op.onrender.com/api';

        // 1. Lógica de Pestañas
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`panel-${tab}`).classList.add('active');

            if (tab === 'corte') cargarRegistros('corte');
        }

        // 2. Enviar Datos al Servidor
        document.getElementById('form-corte').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = 'Subiendo a Supabase...';

            const formData = new FormData();
            const fotos = document.getElementById('fotos-corte').files;

            if (fotos.length !== 3) {
                alert("Debes seleccionar exactamente 3 fotos para el Corte.");
                btn.disabled = false;
                btn.innerText = 'GUARDAR CORTE';
                return;
            }

            formData.append('tipo', 'corte');
            formData.append('observaciones', document.getElementById('obs-corte').value);
            for (let i = 0; i < fotos.length; i++) {
                formData.append('fotos', fotos[i]);
            }

            try {
                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                if (res.ok) {
                    alert('✅ Registro guardado con éxito');
                    e.target.reset();
                    cargarRegistros('corte');
                }
            } catch (err) {
                alert('❌ Error al conectar con el servidor');
            } finally {
                btn.disabled = false;
                btn.innerText = 'GUARDAR CORTE';
            }
        });

        // 3. Cargar Listado (Hacia abajo)
        async function cargarRegistros(tipo) {
            const contenedor = document.getElementById('lista-cortes');
            contenedor.innerHTML = '<p class="loading">Cargando historial...</p>';

            try {
                const res = await fetch(`${API_URL}/registros/${tipo}`);
                const datos = await res.json();

                contenedor.innerHTML = '<h3>Historial de Cortes</h3>';

                datos.forEach(reg => {
                    const card = document.createElement('div');
                    card.className = 'registro-card';
                    card.innerHTML = `
                    <div class="fotos-grid">
                        ${reg.fotos.map(url => `<img src="${url}" onclick="window.open('${url}')">`).join('')}
                    </div>
                    <p><strong>Fecha:</strong> ${new Date(reg.createdAt).toLocaleString()}</p>
                    <p><strong>Obs:</strong> ${reg.observaciones || 'Sin notas'}</p>
                    <button class="btn-delete" onclick="eliminarRegistro(${reg.id})">🗑️ Eliminar fotos</button>
                `;
                    contenedor.appendChild(card);
                });
            } catch (err) {
                contenedor.innerHTML = '<p>Error al cargar historial.</p>';
            }
        }

        // 4. Eliminar Registro
        async function eliminarRegistro(id) {
            if (!confirm('¿Seguro que quieres eliminar este grupo de fotos?')) return;

            try {
                const res = await fetch(`${API_URL}/registros/${id}`, { method: 'DELETE' });
                if (res.ok) cargarRegistros('corte');
            } catch (err) {
                alert('No se pudo eliminar');
            }
        }

        // Cargar datos al iniciar
        window.onload = () => cargarRegistros('corte');

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Sistema de Terreno</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #dc2626;
            --bg: #f3f4f6;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #e5e7eb;
            font-weight: bold;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .btn-cam {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Contenedor de Vista Previa */
        .preview-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            margin: 10px 0;
            padding: 10px;
            min-height: 140px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background: #fafafa;
        }

        /* Item de Vista Previa con Checkbox */
        .preview-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            flex-shrink: 0;
            background: white;
            padding: 5px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 5px;
        }

        .preview-item label {
            font-size: 10px;
            font-weight: bold;
            color: #444;
        }

        .preview-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Historial */
        .historial-section {
            margin-top: 30px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .registro-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .fotos-grid {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .fotos-grid img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 6px;
        }

        .btn-delete {
            color: var(--danger);
            border: 1px solid var(--danger);
            background: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🌊 AquaBit OP</h2>

        <div class="tabs">
            <button id="tab-corte-btn" class="tab-btn active" onclick="cambiarTab('corte')">CORTES</button>
            <button id="tab-repo-btn" class="tab-btn" onclick="cambiarTab('reposicion')">REPOSICIÓN</button>
        </div>

        <div id="panel-corte" class="panel active">
            <button class="btn-cam" onclick="document.getElementById('input-corte').click()">📸 TOMAR FOTO
                (CORTE)</button>
            <input type="file" id="input-corte" accept="image/*" capture="environment" multiple style="display:none">
            <div id="preview-corte" class="preview-container"></div>
            <textarea id="obs-corte" placeholder="Notas de corte..."></textarea>
            <button id="btn-save-corte" class="submit-btn" onclick="enviarDatos('corte')">GUARDAR CORTE</button>

            <div class="historial-section">
                <h3>Historial Cortes</h3>
                <div id="lista-corte"></div>
            </div>
        </div>

        <div id="panel-reposicion" class="panel">
            <button class="btn-cam" onclick="document.getElementById('input-repo').click()">📸 TOMAR FOTO
                (REPO)</button>
            <input type="file" id="input-repo" accept="image/*" capture="environment" multiple style="display:none">

            <div id="preview-repo" class="preview-container">
            </div>

            <textarea id="obs-repo" placeholder="Notas de reposición..."></textarea>
            <button id="btn-save-repo" class="submit-btn" onclick="enviarDatos('reposicion')">GUARDAR
                REPOSICIÓN</button>

            <div class="historial-section">
                <h3>Historial Reposiciones</h3>
                <div id="lista-reposicion"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Almacenamos objetos { file: Binario, verificado: boolean }
        let dataCorte = [];
        let dataRepo = [];

        function cambiarTab(tipo) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`panel-${tipo}`).classList.add('active');
            document.getElementById(`tab-${tipo}-btn`).classList.add('active');
            cargarHistorial(tipo);
        }

        // Manejador de entrada de archivos mejorado
        function configurarCaptura(inputId, dataArray, previewId, conCheckbox) {
            document.getElementById(inputId).onchange = function (e) {
                const files = Array.from(e.target.files);
                const container = document.getElementById(previewId);

                files.forEach((file, index) => {
                    // Creamos una referencia única para este archivo
                    const itemData = { file: file, verificado: false };
                    dataArray.push(itemData);

                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const div = document.createElement('div');
                        div.className = 'preview-item';

                        let html = `<img src="${ev.target.result}">`;

                        if (conCheckbox) {
                            html += `
                                <label>VERIFICADO</label>
                                <input type="checkbox" onchange="actualizarVerificacion('${previewId}', ${dataArray.indexOf(itemData)}, this.checked)">
                            `;
                        }

                        div.innerHTML = html;
                        container.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            };
        }

        function actualizarVerificacion(previewId, index, isChecked) {
            if (previewId === 'preview-repo') {
                dataRepo[index].verificado = isChecked;
            }
        }

        configurarCaptura('input-corte', dataCorte, 'preview-corte', false);
        configurarCaptura('input-repo', dataRepo, 'preview-repo', true);

        async function enviarDatos(tipo) {
            const btn = document.getElementById(tipo === 'corte' ? 'btn-save-corte' : 'btn-save-repo');
            const dataList = tipo === 'corte' ? dataCorte : dataRepo;
            let obs = document.getElementById(tipo === 'corte' ? 'obs-corte' : 'obs-repo').value;

            if (dataList.length === 0) return alert("Captura fotos");

            btn.disabled = true;
            btn.innerText = "SUBIENDO...";

            try {
                const urls = [];
                let contadorVerificadas = 0;

                for (let item of dataList) {
                    const name = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 5)}.jpg`;
                    const { error } = await supabaseClient.storage.from('fotos-aquabit').upload(name, item.file);
                    if (error) throw error;

                    const { data: { publicUrl } } = supabaseClient.storage.from('fotos-aquabit').getPublicUrl(name);
                    urls.push(publicUrl);

                    if (item.verificado) contadorVerificadas++;
                }

                // Si hay imágenes marcadas, lo añadimos a la nota
                if (contadorVerificadas > 0) {
                    obs = `[${contadorVerificadas} FOTO(S) VERIFICADA(S)] ` + obs;
                }

                await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tipo, observaciones: obs, fotos: urls })
                });

                alert("✅ Éxito");
                location.reload();
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
            }
        }

        async function cargarHistorial(tipo) {
            const cont = document.getElementById(tipo === 'corte' ? 'lista-corte' : 'lista-reposicion');
            cont.innerHTML = '...';
            try {
                const res = await fetch(`${API_URL}/registros/${tipo}`);
                const datos = await res.json();
                cont.innerHTML = '';
                datos.forEach(reg => {
                    const div = document.createElement('div');
                    div.className = 'registro-card';
                    div.innerHTML = `
                        <div class="fotos-grid">${reg.fotos.map(u => `<img src="${u}">`).join('')}</div>
                        <p><small>${new Date(reg.createdAt).toLocaleString()}</small></p>
                        <p>${reg.observaciones || ''}</p>
                        <button class="btn-delete" onclick="eliminarReg(${reg.id}, '${tipo}')">ELIMINAR</button>
                    `;
                    cont.appendChild(div);
                });
            } catch (e) { }
        }

        async function eliminarReg(id, tipo) {
            if (confirm('¿Eliminar?')) {
                await fetch(`${API_URL}/registros/${id}`, { method: 'DELETE' });
                cargarHistorial(tipo);
            }
        }

        window.onload = () => cargarHistorial('corte');
    </script>
</body>

</html>

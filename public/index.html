<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaBit OP - Sistema Esencial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #0066ff;
            --success: #00875a;
            --bg: #f4f7f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0 0 15px 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            margin-bottom: 10px;
        }

        .btn-camera {
            background: var(--primary);
            color: white;
            font-size: 1rem;
        }

        .btn-send {
            background: var(--success);
            color: white;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .btn-mode {
            background: #e2e8f0;
            color: #475569;
            width: 48%;
            display: inline-block;
        }

        .btn-active {
            background: var(--primary);
            color: white;
        }

        #listaFotos {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            min-height: 80px;
        }

        .img-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .img-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .btn-del {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            border: none;
        }

        textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            box-sizing: border-box;
            font-size: 14px;
            margin-top: 5px;
        }

        .historial-item {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            margin-bottom: 10px;
            font-size: 13px;
        }

        .historial-imgs {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .historial-imgs img {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h1>AquaBit OP - Terreno</h1>

    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <button id="btn-corte" class="btn btn-mode btn-active" onclick="setTipo('corte')">CORTE</button>
        <button id="btn-repo" class="btn btn-mode" onclick="setTipo('reposicion')">REPOSICIÓN</button>
    </div>

    <div class="card">
        <input type="file" id="fotoInput" accept="image/*" capture="environment" style="display:none"
            onchange="procesarFoto()">
        <button class="btn btn-camera" onclick="document.getElementById('fotoInput').click()">📸 TOMAR
            FOTOGRAFÍA</button>

        <div id="listaFotos"></div>

        <label style="font-size: 12px; font-weight: bold; color: #666;">OBSERVACIONES:</label>
        <textarea id="obs" rows="3" placeholder="Detalles del terreno..."></textarea>

        <button id="btnEnviar" class="btn btn-send" onclick="enviarRegistro()">SINCRONIZAR AHORA</button>
    </div>

    <div id="historialSection">
        <h2 style="font-size: 14px; color: #666;">ÚLTIMOS REGISTROS (<span id="countLabel">0</span>)</h2>
        <div id="historialContenedor"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://mjxpqxyxkshtqlptccto.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1qeHBxeHl4a3NodHFscHRjY3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzQyOTAsImV4cCI6MjA5MjMxMDI5MH0.KGi6VT8g-zKeEi0NWHpkdzdKHP1mF11Ch0Q-46c2Wps';
        const API_URL = 'https://aquabit-op.onrender.com/api';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let tipoActual = 'corte';
        let fotosParaSubir = [];

        function setTipo(t) {
            tipoActual = t;
            fotosParaSubir = [];
            document.getElementById('listaFotos').innerHTML = '';
            document.getElementById('obs').value = '';
            document.getElementById('btn-corte').classList.toggle('btn-active', t === 'corte');
            document.getElementById('btn-repo').classList.toggle('btn-active', t === 'reposicion');
            cargarHistorial();
        }

        // Lógica de Vista Previa: Guarda el archivo REAL para evitar los 17 bytes
        function procesarFoto() {
            const input = document.getElementById('fotoInput');
            if (input.files && input.files) {
                const file = input.files;
                fotosParaSubir.push(file);

                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper';

                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.className = 'img-preview';

                const btn = document.createElement('button');
                btn.innerHTML = '×';
                btn.className = 'btn-del';
                btn.onclick = () => {
                    wrapper.remove();
                    fotosParaSubir = fotosParaSubir.filter(f => f !== file);
                };

                wrapper.appendChild(img);
                wrapper.appendChild(btn);
                document.getElementById('listaFotos').appendChild(wrapper);
                input.value = ""; // Reset para permitir otra foto
            }
        }

        async function enviarRegistro() {
            if (fotosParaSubir.length === 0) return alert("Captura evidencia primero.");

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.innerText = "SUBIENDO IMÁGENES...";

            try {
                const urlsFinales = [];
                for (let file of fotosParaSubir) {
                    // Nombre único para el bucket
                    const fileName = `aq_${Date.now()}_${Math.random().toString(36).substr(2, 4)}.jpg`;

                    // SUBIDA DIRECTA: El SDK maneja el binario real aquí
                    const { data, error } = await supabaseClient.storage
                        .from('fotos-aquabit')
                        .upload(fileName, file, {
                            contentType: 'image/jpeg',
                            cacheControl: '3600'
                        });

                    if (error) throw new Error("Supabase: " + error.message);

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('fotos-aquabit')
                        .getPublicUrl(fileName);

                    urlsFinales.push(publicUrl);
                }

                btn.innerText = "REGISTRANDO DATOS...";
                const res = await fetch(`${API_URL}/upload`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tipo: tipoActual,
                        observaciones: document.getElementById('obs').value,
                        fotos: urlsFinales
                    })
                });

                if (res.ok) {
                    alert("✅ REGISTRO COMPLETADO");
                    location.reload();
                }
            } catch (err) {
                alert("FALLO TÉCNICO: " + err.message);
                btn.disabled = false;
                btn.innerText = "REINTENTAR SINCRONIZACIÓN";
            }
        }

        async function cargarHistorial() {
            const cont = document.getElementById('historialContenedor');
            try {
                const res = await fetch(`${API_URL}/registros/${tipoActual}`);
                const data = await res.json();
                document.getElementById('countLabel').innerText = data.length;
                cont.innerHTML = "";

                data.forEach(reg => {
                    const div = document.createElement('div');
                    div.className = 'historial-item';
                    div.innerHTML = `
                        <div style="display:flex; justify-content:space-between; font-size:10px; color:#999; margin-bottom:5px;">
                            <span>${new Date(reg.createdAt).toLocaleString()}</span>
                            <span style="color:red; font-weight:bold" onclick="eliminar(${reg.id})">ELIMINAR</span>
                        </div>
                        <strong>${reg.observaciones || 'Sin notas.'}</strong>
                        <div class="historial-imgs">
                            ${reg.fotos.map(u => `<img src="${u}">`).join('')}
                        </div>
                    `;
                    cont.appendChild(div);
                });
            } catch (e) { }
        }

        async function eliminar(id) {
            if (confirm('¿Borrar registro?')) {
                await fetch(`${API_URL}/registros/${id}`, { method: 'DELETE' });
                cargarHistorial();
            }
        }

        // Inicializar
        cargarHistorial();
    </script>
</body>

</html>

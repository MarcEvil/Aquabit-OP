<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaBit OP - Terreno</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white p-4">

    <h1 class="text-2xl font-bold mb-6 text-blue-400">AquaBit Operaciones</h1>

    <div class="flex gap-2 mb-6">
        <button onclick="setTipo('corte')" id="btn-corte"
            class="flex-1 p-3 rounded bg-blue-600 font-bold">Corte</button>
        <button onclick="setTipo('reposicion')" id="btn-repo"
            class="flex-1 p-3 rounded bg-gray-700 font-bold">Reposición</button>
    </div>

    <div class="bg-gray-800 p-4 rounded-lg shadow-xl mb-8">
        <input type="file" id="fotoInput" multiple accept="image/*" class="hidden">
        <button onclick="document.getElementById('fotoInput').click()"
            class="w-full bg-green-600 p-4 rounded mb-4 font-bold">📸 Tomar/Subir Fotos (3)</button>

        <textarea id="obs" placeholder="Observaciones..."
            class="w-full p-3 bg-gray-700 rounded mb-4 h-24 text-white"></textarea>

        <button id="btnEnviar" onclick="enviar()"
            class="w-full bg-blue-500 p-4 rounded font-bold disabled:opacity-50">Guardar Registro</button>
    </div>

    <h2 class="text-xl font-semibold mb-4 border-b border-gray-700 pb-2">Historial Reciente</h2>
    <div id="historial" class="space-y-4">
    </div>

    <script>
        let tipoActual = 'corte';
        const API_URL = '/api';

        function setTipo(t) {
            tipoActual = t;
            document.getElementById('btn-corte').className = t === 'corte' ? 'flex-1 p-3 rounded bg-blue-600 font-bold' : 'flex-1 p-3 rounded bg-gray-700 font-bold';
            document.getElementById('btn-repo').className = t === 'reposicion' ? 'flex-1 p-3 rounded bg-blue-600 font-bold' : 'flex-1 p-3 rounded bg-gray-700 font-bold';
            cargarHistorial();
        }

        async function cargarHistorial() {
            const res = await fetch(`${API_URL}/registros/${tipoActual}`);
            const datos = await res.json();
            const contenedor = document.getElementById('historial');
            contenedor.innerHTML = '';

            if (datos.error) {
                contenedor.innerHTML = `<p class="text-red-400">${datos.error}</p>`;
                return;
            }

            datos.forEach(reg => {
                const div = document.createElement('div');
                div.className = 'bg-gray-800 p-3 rounded shadow relative';
                div.innerHTML = `
                    <button onclick="eliminar(${reg.id})" class="absolute top-2 right-2 bg-red-600 text-white text-xs px-2 py-1 rounded">X</button>
                    <p class="text-xs text-gray-400">${new Date(reg.createdAt).toLocaleString()}</p>
                    <p class="my-2">${reg.observaciones || 'Sin observaciones'}</p>
                    <div class="flex gap-1 overflow-x-auto">
                        ${reg.fotos.map(url => `<img src="${url}" class="h-20 w-20 object-cover rounded">`).join('')}
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }

        async function eliminar(id) {
            if (!confirm('¿Eliminar este registro?')) return;
            await fetch(`${API_URL}/registros/${id}`, { method: 'DELETE' });
            cargarHistorial();
        }

        async function enviar() {
            // Lógica de subida (Debe implementar Supabase Storage en el frontend para obtener las URLs)
            // Aquí llamarías a tu función de subida y luego al POST de /api/upload
            alert('Asegúrate de integrar tu script de subida a Supabase Storage aquí.');
        }

        cargarHistorial();
    </script>
</body>

</html>
